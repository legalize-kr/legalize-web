name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip R2 image upload'
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout legalize-web
        uses: actions/checkout@v4

      - name: Checkout legalize-pipeline
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/legalize-pipeline
          path: pipeline

      # Optional: upload new images to R2 (workflow_dispatch only)
      - name: Upload images to R2
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.skip_upload }}
        working-directory: pipeline
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          pip install boto3
          python -m images upload

      # Re-export sharded image data if manifest exists in workspace
      - name: Export image data (sharded)
        working-directory: pipeline
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          pip install requests pyyaml python-dotenv
          if [ -f "$WORKSPACE_ROOT/.cache/images/manifest.json" ]; then
            python -m images export --output ${{ github.workspace }}/public/data/images/ --sharded
          else
            echo "No image manifest found, using committed data"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify site size
        run: |
          SIZE=$(du -sm _site/ | cut -f1)
          echo "Site size: ${SIZE}MB"
          if [ "$SIZE" -gt 500 ]; then
            echo "::error::Site size exceeds 500MB limit (${SIZE}MB)"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
